name: Repackage Dify Plugin

on:
  workflow_dispatch:
    inputs:
      plugin_author:
        description: "plugin author"
        required: true
        type: string
      plugin_name:
        description: "plugin name"
        required: true
        type: string
      plugin_version:
        description: "plugin version"
        required: true
        type: string
      platform_arm:
        description: "Use ARM platform (true = manylinux_2_17_aarch64, false = manylinux_2_17_x86_64)"
        required: true
        default: "false"

jobs:
  repackage:
    runs-on: ubuntu-latest
    steps:
      - name: Print workflow inputs
        run: |
          echo "plugin_author  = ${{ inputs.plugin_author }}"
          echo "plugin_name    = ${{ inputs.plugin_name }}"
          echo "plugin_version = ${{ inputs.plugin_version }}"
          echo "platform_arm   = ${{ inputs.platform_arm }}"
      
      - name: Set up QEMU for ARM64 emulation
        if: inputs.platform_arm == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      
      - name: Resolve platform
        run: |
          if [ "${{ inputs.platform_arm }}" = "true" ]; then
            echo "PIP_PLATFORM=manylinux_2_17_aarch64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=offline-arm" >> "$GITHUB_ENV"
            echo "DOCKER_ARCH=arm64" >> "$GITHUB_ENV"
          else
            echo "PIP_PLATFORM=manylinux_2_17_x86_64" >> "$GITHUB_ENV"
            echo "PACKAGE_SUFFIX=offline" >> "$GITHUB_ENV"
            echo "DOCKER_ARCH=amd64" >> "$GITHUB_ENV"
          fi
      
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run plugin repackaging in Docker (ARM64)
        if: inputs.platform_arm == 'true'
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e PIP_MIRROR_URL=https://pypi.org/simple \
            -e PIP_PLATFORM=${{ env.PIP_PLATFORM }} \
            -e PACKAGE_SUFFIX=${{ env.PACKAGE_SUFFIX }} \
            python:3.12-slim \
            bash -c "
              set -e && \
              echo 'Installing required packages...' && \
              apt-get update && \
              apt-get install -y --no-install-recommends \
                unzip \
                zip \
                curl \
                ca-certificates && \
              rm -rf /var/lib/apt/lists/* && \
              echo 'Making script executable...' && \
              chmod +x ./plugin_repackaging.sh && \
              echo 'Running plugin repackaging...' && \
              ./plugin_repackaging.sh \
                -p \${PIP_PLATFORM} \
                -s \${PACKAGE_SUFFIX} \
                market \
                '${{ github.event.inputs.plugin_author }}' \
                '${{ github.event.inputs.plugin_name }}' \
                '${{ github.event.inputs.plugin_version }}'
            "
      
      - name: Run plugin repackaging natively (x86_64)
        if: inputs.platform_arm == 'false'
        run: |
          chmod +x ./plugin_repackaging.sh
          PIP_MIRROR_URL=https://pypi.org/simple \
          ./plugin_repackaging.sh \
          -p ${{ env.PIP_PLATFORM }} \
          -s ${{ env.PACKAGE_SUFFIX }} \
          market \
          "${{ github.event.inputs.plugin_author }}" \
          "${{ github.event.inputs.plugin_name }}" \
          "${{ github.event.inputs.plugin_version }}"
      
      - name: Find repackaged artifact
        run: |
          ARTIFACT_PATH=$(find . -type f -name "*-${PACKAGE_SUFFIX}.difypkg" | head -n 1)
          if [ -z "$ARTIFACT_PATH" ]; then
            echo "No *-${PACKAGE_SUFFIX}.difypkg artifact found!"
            exit 1
          fi
      
          echo "ARTIFACT_PATH=$ARTIFACT_PATH" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=$(basename "$ARTIFACT_PATH")" >> $GITHUB_ENV
      
      - name: Verify artifact architecture
        run: |
          if [ "${{ inputs.platform_arm }}" = "true" ]; then
            echo "Verifying ARM64 artifact..."
            echo "Artifact: $ARTIFACT_PATH"
            echo "Package contents:"
            unzip -l "$ARTIFACT_PATH" | head -30
            # 检查是否有二进制文件
            BIN_FILES=$(unzip -l "$ARTIFACT_PATH" | grep -E "\.(so|dylib|node)$" || true)
            if [ -n "$BIN_FILES" ]; then
              echo "Binary files found in package:"
              echo "$BIN_FILES"
              echo "Note: These files should be ARM64 architecture"
            else
              echo "No binary files found (pure Python plugin)"
            fi
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
